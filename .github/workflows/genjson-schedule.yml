name: Update posts.json

on:
  push:
    branches:
      - dev
    paths:
      - 'posts/**'
      - 'genjson.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-posts-json-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-posts-json:
    if: github.actor != 'github-actions[bot]' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run genjson.py
        run: python genjson.py

      - name: Detect posts.json changes
        id: changes
        run: |
          set -e
          if git diff --quiet -- posts.json; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "posts.json is already up to date."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git diff --stat -- posts.json
          fi

      - name: Commit and push posts.json
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts.json
          git commit -m "chore: update posts.json [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
